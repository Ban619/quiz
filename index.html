<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .quiz-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .quiz-header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .quiz-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .quiz-header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .quiz-body {
            padding: 40px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .question-counter {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1rem;
            color: #666;
        }

        .question-container {
            margin-bottom: 30px;
        }

        .question {
            font-size: 1.4rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .answers {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .answer {
            background: #f8f9ff;
            border: 2px solid #e1e8ff;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            position: relative;
            overflow: hidden;
        }

        .answer:hover {
            background: #e8f2ff;
            border-color: #4facfe;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.2);
        }

        .answer.selected {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border-color: #4facfe;
        }

        .answer.correct {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%);
            border-color: #56ab2f;
            color: white;
        }

        .answer.incorrect {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            border-color: #ff416c;
            color: white;
        }

        .quiz-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .results-container {
            text-align: center;
            padding: 40px;
        }

        .results-container h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-display {
            font-size: 3rem;
            font-weight: bold;
            color: #333;
            margin: 20px 0;
        }

        .score-percentage {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 30px;
        }

        .performance-message {
            font-size: 1.2rem;
            margin-bottom: 30px;
            padding: 20px;
            border-radius: 10px;
        }

        .excellent {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%);
            color: white;
        }

        .good {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .needs-improvement {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #333;
        }

        .hidden {
            display: none;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .start-screen {
            text-align: center;
            padding: 40px;
        }

        .start-screen h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #333;
        }

        .start-screen p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            .quiz-container {
                margin: 10px;
            }
            
            .quiz-header h1 {
                font-size: 2rem;
            }
            
            .quiz-body {
                padding: 30px 20px;
            }
            
            .question {
                font-size: 1.2rem;
            }
            
            .answer {
                padding: 15px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="quiz-header">
            <h1>🧠 Quiz Challenge</h1>
            <p>Test your knowledge with our interactive quiz!</p>
        </div>
        
        <!-- Start Screen -->
        <div id="start-screen" class="start-screen">
            <h2>Welcome to the Quiz!</h2>
            <p>This quiz contains 10 questions covering various topics. You'll have multiple choice answers for each question. Good luck!</p>
            <button class="btn btn-primary" onclick="startQuiz()">Start Quiz</button>
        </div>
        
        <!-- Quiz Screen -->
        <div id="quiz-screen" class="quiz-body hidden">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            
            <div class="question-counter">
                <span id="current-question">1</span> of <span id="total-questions">10</span>
            </div>
            
            <div class="question-container">
                <h2 class="question" id="question-text"></h2>
                <div class="answers" id="answers-container"></div>
            </div>
            
            <div class="quiz-buttons">
                <button class="btn btn-secondary" id="prev-btn" onclick="previousQuestion()" disabled>Previous</button>
                <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" disabled>Next</button>
            </div>
        </div>
        
        <!-- Results Screen -->
        <div id="results-screen" class="results-container hidden">
            <h2>Quiz Complete!</h2>
            <div class="score-display" id="final-score">0/10</div>
            <div class="score-percentage" id="score-percentage">0%</div>
            <div class="performance-message" id="performance-message"></div>
            <button class="btn btn-primary" onclick="restartQuiz()">Take Quiz Again</button>
        </div>
    </div>

    <script>
        // Quiz data
        const quizData = [
            {
                question: "What is the capital of France?",
                answers: ["London", "Berlin", "Paris", "Madrid"],
                correct: 2
            },
            {
                question: "Which planet is known as the Red Planet?",
                answers: ["Venus", "Mars", "Jupiter", "Saturn"],
                correct: 1
            },
            {
                question: "What is the largest mammal in the world?",
                answers: ["African Elephant", "Blue Whale", "Giraffe", "Polar Bear"],
                correct: 1
            },
            {
                question: "In which year did World War II end?",
                answers: ["1944", "1945", "1946", "1947"],
                correct: 1
            },
            {
                question: "What is the chemical symbol for gold?",
                answers: ["Go", "Gd", "Au", "Ag"],
                correct: 2
            },
            {
                question: "Which programming language is known as the 'language of the web'?",
                answers: ["Python", "Java", "JavaScript", "C++"],
                correct: 2
            },
            {
                question: "What is the smallest country in the world?",
                answers: ["Monaco", "Vatican City", "San Marino", "Liechtenstein"],
                correct: 1
            },
            {
                question: "Who painted the Mona Lisa?",
                answers: ["Vincent van Gogh", "Pablo Picasso", "Leonardo da Vinci", "Michelangelo"],
                correct: 2
            },
            {
                question: "What is the hardest natural substance on Earth?",
                answers: ["Gold", "Iron", "Diamond", "Platinum"],
                correct: 2
            },
            {
                question: "Which ocean is the largest?",
                answers: ["Atlantic Ocean", "Indian Ocean", "Arctic Ocean", "Pacific Ocean"],
                correct: 3
            }
        ];

        // Quiz state
        let currentQuestionIndex = 0;
        let selectedAnswers = [];
        let score = 0;

        // DOM elements
        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultsScreen = document.getElementById('results-screen');
        const questionText = document.getElementById('question-text');
        const answersContainer = document.getElementById('answers-container');
        const currentQuestionSpan = document.getElementById('current-question');
        const totalQuestionsSpan = document.getElementById('total-questions');
        const progressFill = document.getElementById('progress-fill');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        // Initialize quiz
        function startQuiz() {
            startScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            quizScreen.classList.add('fade-in');
            
            totalQuestionsSpan.textContent = quizData.length;
            selectedAnswers = new Array(quizData.length).fill(null);
            currentQuestionIndex = 0;
            score = 0;
            
            displayQuestion();
        }

        // Display current question
        function displayQuestion() {
            const question = quizData[currentQuestionIndex];
            
            questionText.textContent = question.question;
            currentQuestionSpan.textContent = currentQuestionIndex + 1;
            
            // Update progress bar
            const progress = ((currentQuestionIndex) / quizData.length) * 100;
            progressFill.style.width = progress + '%';
            
            // Clear previous answers
            answersContainer.innerHTML = '';
            
            // Create answer options
            question.answers.forEach((answer, index) => {
                const answerDiv = document.createElement('div');
                answerDiv.className = 'answer';
                answerDiv.textContent = answer;
                answerDiv.onclick = () => selectAnswer(index);
                
                // Restore previous selection
                if (selectedAnswers[currentQuestionIndex] === index) {
                    answerDiv.classList.add('selected');
                }
                
                answersContainer.appendChild(answerDiv);
            });
            
            // Update button states
            prevBtn.disabled = currentQuestionIndex === 0;
            nextBtn.disabled = selectedAnswers[currentQuestionIndex] === null;
            nextBtn.textContent = currentQuestionIndex === quizData.length - 1 ? 'Finish Quiz' : 'Next';
        }

        // Select an answer
        function selectAnswer(answerIndex) {
            // Remove previous selection
            document.querySelectorAll('.answer').forEach(answer => {
                answer.classList.remove('selected');
            });
            
            // Add selection to clicked answer
            document.querySelectorAll('.answer')[answerIndex].classList.add('selected');
            
            // Store the selection
            selectedAnswers[currentQuestionIndex] = answerIndex;
            
            // Enable next button
            nextBtn.disabled = false;
        }

        // Go to next question
        function nextQuestion() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                displayQuestion();
            } else {
                showResults();
            }
        }

        // Go to previous question
        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuestion();
            }
        }

        // Calculate and show results
        function showResults() {
            // Calculate score
            score = 0;
            selectedAnswers.forEach((answer, index) => {
                if (answer === quizData[index].correct) {
                    score++;
                }
            });
            
            // Hide quiz screen and show results
            quizScreen.classList.add('hidden');
            resultsScreen.classList.remove('hidden');
            resultsScreen.classList.add('fade-in');
            
            // Display results
            document.getElementById('final-score').textContent = `${score}/${quizData.length}`;
            const percentage = Math.round((score / quizData.length) * 100);
            document.getElementById('score-percentage').textContent = `${percentage}%`;
            
            // Show performance message
            const performanceMessage = document.getElementById('performance-message');
            if (percentage >= 80) {
                performanceMessage.textContent = "Excellent! You're a quiz master! 🏆";
                performanceMessage.className = "performance-message excellent";
            } else if (percentage >= 60) {
                performanceMessage.textContent = "Good job! Keep learning! 👍";
                performanceMessage.className = "performance-message good";
            } else {
                performanceMessage.textContent = "Keep practicing! You'll do better next time! 💪";
                performanceMessage.className = "performance-message needs-improvement";
            }
            
            // Update progress bar to 100%
            progressFill.style.width = '100%';
        }

        // Restart quiz
        function restartQuiz() {
            resultsScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            startScreen.classList.add('fade-in');
            
            // Reset progress bar
            progressFill.style.width = '0%';
        }

        // Initialize total questions display
        document.addEventListener('DOMContentLoaded', function() {
            totalQuestionsSpan.textContent = quizData.length;
        });
    </script>
</body>
</html>
