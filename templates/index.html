<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Powered by Python</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon {
            font-size: 1.5rem;
        }

        .chat-container {
            grid-column: 1 / -1;
        }

        .chat-messages {
            height: 400px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .user-message {
            background: #667eea;
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .ai-message {
            background: #e8f4fd;
            color: #333;
            border-left: 4px solid #667eea;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"], textarea {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        button:hover {
            background: #5a6fd8;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            background: #f8f9fa;
            border-left: 4px solid #28a745;
        }

        .error {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .status-online {
            background: #28a745;
        }

        .status-offline {
            background: #dc3545;
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            background: #f8f9fa;
            border: 1px solid #e0e0e0;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI Assistant</h1>
            <p>Powered by Python, PyTorch & Transformers</p>
            <div id="status">
                <span class="status-indicator status-offline"></span>
                <span>Connecting...</span>
            </div>
        </div>

        <div class="card chat-container">
            <h2><span class="icon">💬</span>Chat with AI</h2>
            <div id="chatMessages" class="chat-messages">
                <div class="message ai-message">
                    Hello! I'm your AI assistant. You can chat with me, ask me to analyze sentiment, or generate creative text. How can I help you today?
                </div>
            </div>
            <div class="input-group">
                <input type="text" id="chatInput" placeholder="Type your message here..." maxlength="500">
                <button onclick="sendMessage()">Send</button>
                <button onclick="clearChat()">Clear</button>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <h2><span class="icon">🎭</span>Sentiment Analysis</h2>
                <div class="input-group">
                    <textarea id="sentimentInput" placeholder="Enter text to analyze sentiment..." rows="3" maxlength="1000"></textarea>
                    <button onclick="analyzeSentiment()">Analyze</button>
                </div>
                <div id="sentimentResult"></div>
            </div>

            <div class="card">
                <h2><span class="icon">✍️</span>Text Generation</h2>
                <div class="input-group">
                    <textarea id="generateInput" placeholder="Enter a prompt for text generation..." rows="2" maxlength="200"></textarea>
                    <button onclick="generateText()">Generate</button>
                </div>
                <div class="input-group">
                    <label>Max Length: </label>
                    <input type="number" id="maxLength" value="200" min="50" max="500" style="width: 100px;">
                </div>
                <div id="generateResult"></div>
            </div>
        </div>

        <div class="card">
            <h2><span class="icon">⚙️</span>System Status</h2>
            <div id="systemStatus">
                <button onclick="checkStatus()">Check Status</button>
            </div>
        </div>
    </div>

    <script>
        let isLoading = false;

        // Check system status on page load
        window.onload = function() {
            checkStatus();
            
            // Enable Enter key for chat
            document.getElementById('chatInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        };

        async function sendMessage() {
            if (isLoading) return;
            
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Add user message to chat
            addMessageToChat(message, 'user');
            input.value = '';
            
            // Show loading
            const loadingDiv = addMessageToChat('🤖 Thinking...', 'ai');
            isLoading = true;
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message })
                });
                
                const data = await response.json();
                
                // Remove loading message and add AI response
                loadingDiv.remove();
                
                if (data.error) {
                    addMessageToChat('❌ ' + data.error, 'ai');
                } else {
                    addMessageToChat(data.response, 'ai');
                }
                
            } catch (error) {
                loadingDiv.remove();
                addMessageToChat('❌ Network error occurred', 'ai');
            }
            
            isLoading = false;
        }

        function addMessageToChat(message, sender) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            messageDiv.textContent = message;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return messageDiv;
        }

        function clearChat() {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = '<div class="message ai-message">Chat cleared! How can I help you?</div>';
            
            // Clear server-side history
            fetch('/api/clear_history', { method: 'POST' });
        }

        async function analyzeSentiment() {
            const input = document.getElementById('sentimentInput');
            const text = input.value.trim();
            const resultDiv = document.getElementById('sentimentResult');
            
            if (!text) {
                showResult(resultDiv, 'Please enter text to analyze', true);
                return;
            }
            
            showResult(resultDiv, '<div class="loading"></div> Analyzing sentiment...');
            
            try {
                const response = await fetch('/api/sentiment', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showResult(resultDiv, '❌ ' + data.error, true);
                } else {
                    const emoji = data.sentiment === 'POSITIVE' ? '😊' : 
                                 data.sentiment === 'NEGATIVE' ? '😞' : '😐';
                    showResult(resultDiv, 
                        `${emoji} <strong>Sentiment:</strong> ${data.sentiment}<br>
                         📊 <strong>Confidence:</strong> ${(data.confidence * 100).toFixed(1)}%`);
                }
                
            } catch (error) {
                showResult(resultDiv, '❌ Network error occurred', true);
            }
        }

        async function generateText() {
            const input = document.getElementById('generateInput');
            const maxLengthInput = document.getElementById('maxLength');
            const prompt = input.value.trim();
            const maxLength = parseInt(maxLengthInput.value);
            const resultDiv = document.getElementById('generateResult');
            
            if (!prompt) {
                showResult(resultDiv, 'Please enter a prompt', true);
                return;
            }
            
            showResult(resultDiv, '<div class="loading"></div> Generating text...');
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ prompt, max_length: maxLength })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showResult(resultDiv, '❌ ' + data.error, true);
                } else {
                    showResult(resultDiv, 
                        `✍️ <strong>Generated Text:</strong><br>
                         <div style="margin-top: 10px; padding: 10px; background: white; border-radius: 5px; font-style: italic;">
                         ${data.generated_text}
                         </div>`);
                }
                
            } catch (error) {
                showResult(resultDiv, '❌ Network error occurred', true);
            }
        }

        async function checkStatus() {
            const statusDiv = document.getElementById('systemStatus');
            const statusIndicator = document.querySelector('.status-indicator');
            const statusText = statusIndicator.nextElementSibling;
            
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                if (data.status === 'running') {
                    statusIndicator.className = 'status-indicator status-online';
                    statusText.textContent = 'Online';
                    
                    statusDiv.innerHTML = `
                        <button onclick="checkStatus()">Refresh Status</button>
                        <div style="margin-top: 15px;">
                            <h4>✅ System Running</h4>
                            <p><strong>Device:</strong> ${data.model_info.device}</p>
                            <p><strong>Chat Model:</strong> ${data.model_info.chat_model}</p>
                            <p><strong>Sentiment Model:</strong> ${data.model_info.sentiment_model}</p>
                            <p><strong>Models Loaded:</strong></p>
                            <ul style="margin-left: 20px;">
                                <li>Chat: ${data.model_info.models_loaded.chat ? '✅' : '❌'}</li>
                                <li>Sentiment: ${data.model_info.models_loaded.sentiment ? '✅' : '❌'}</li>
                                <li>Generator: ${data.model_info.models_loaded.text_generator ? '✅' : '❌'}</li>
                            </ul>
                        </div>
                    `;
                } else {
                    statusIndicator.className = 'status-indicator status-offline';
                    statusText.textContent = 'Offline';
                    statusDiv.innerHTML = '<button onclick="checkStatus()">Retry Connection</button><p style="color: red;">❌ AI models not loaded</p>';
                }
                
            } catch (error) {
                statusIndicator.className = 'status-indicator status-offline';
                statusText.textContent = 'Error';
                statusDiv.innerHTML = '<button onclick="checkStatus()">Retry Connection</button><p style="color: red;">❌ Connection failed</p>';
            }
        }

        function showResult(element, content, isError = false) {
            element.innerHTML = `<div class="result ${isError ? 'error' : ''}">${content}</div>`;
        }
    </script>
</body>
</html>
